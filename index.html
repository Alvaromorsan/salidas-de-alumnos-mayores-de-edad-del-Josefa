<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Salida - IES Josefa de los Reyes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .student-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
        }
        .student-card:active {
            transform: scale(0.94);
        }
        .modal-overlay {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
        }
        .happy-shadow {
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.2);
        }
        /* Ocultar barra de scroll en modales largos */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-12">

    <!-- Encabezado -->
    <header class="p-8 text-center">
        <div class="inline-block bg-white px-8 py-5 rounded-[2.5rem] shadow-xl happy-shadow border border-blue-50">
            <h1 class="text-2xl font-extrabold text-blue-900 tracking-tight leading-none mb-1">IES Josefa de los Reyes</h1>
            <p class="text-blue-500 font-bold text-[10px] tracking-widest uppercase">Autorizaciones de Salida</p>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <div class="mb-8 text-center">
            <h2 class="text-lg font-bold text-slate-700">Alumnos mayores de edad</h2>
            <p class="text-slate-400 text-sm">Toca la foto para ver quién puede salir con ellos</p>
        </div>

        <!-- Rejilla de Alumnos Mayores -->
        <div id="gridStudents" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 gap-6">
            <!-- Cargado por JavaScript -->
        </div>
    </main>

    <!-- Modal de Detalles -->
    <div id="modalDetails" class="fixed inset-0 modal-overlay hidden z-20 flex items-center justify-center p-4">
        <div class="w-full max-w-md max-h-screen overflow-y-auto no-scrollbar flex flex-col items-center">
            
            <button onclick="closeModal()" class="mb-4 bg-white border-2 border-slate-100 text-slate-400 rounded-full p-4 shadow-xl active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div id="modalContent" class="w-full space-y-6 px-2">
                <!-- Cargado por JavaScript -->
            </div>

            <div class="mt-8 pb-10 w-full px-2">
                <button onclick="closeModal()" class="bg-blue-600 text-white py-5 rounded-[2.5rem] font-extrabold w-full text-xl shadow-lg shadow-blue-200 active:scale-95 transition-all">
                    Cerrar consulta
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Transforma enlaces de Google Drive en enlaces directos de imagen.
         * Soporta enlaces de visualización y enlaces compartidos.
         */
        function cleanDriveLink(url) {
            if (!url || url.trim() === "") return "https://via.placeholder.com/400?text=Sin+Foto";
            // Extraer el ID del archivo de Google Drive (cadena larga de caracteres)
            const idMatch = url.match(/[-\w]{25,}/);
            if (idMatch) {
                // Usamos el endpoint de visualización directa de Google
                return `https://lh3.googleusercontent.com/d/${idMatch[0]}`;
            }
            return url;
        }

        const studentsData = [
            {
                name: "Sebastián Guzmán",
                group: "2º CFGB",
                photo: "https://drive.google.com/file/d/18VW-kRSBxKH7kHI0h-aGSLxtqAzsgg32/view?usp=drive_link", 
                authorized: [
                    { name: "Héctor Aguilar", group: "2º CFGB", photo: "https://drive.google.com/file/d/1HJEKWhBzLva-oqi2cm5crQhIrhwXDmKq/view?usp=drive_link" },
                    { name: "Francisco Javier Gómez", group: "2º CFGB", photo: "https://drive.google.com/file/d/19N_v4EvC9LIhFnegKmlpVSne4CWVlA3m/view?usp=sharing" },
                    { name: "Juan Antonio Gutiérrez", group: "2º CFGB", photo: "https://drive.google.com/file/d/1aj0eYwRy8KUDnXRpxmiMBCU64PYkS-wJ/view?usp=drive_link" },
                    { name: "Francisco López", group: "2º CFGB", photo: "https://drive.google.com/file/d/1GHKB9z38G3i7Zj5CudNtsq-3jWNOtZh_/view?usp=drive_link" },
                    { name: "Samuel Millán", group: "2º CFGB", photo: "https://drive.google.com/file/d/1puC5EbYu4Hr-xslPc2wQARjrxVGIfzH0/view?usp=drive_link" },
                    { name: "Rafael Trujillo", group: "2º CFGB", photo: "https://drive.google.com/file/d/1woEY7whWCCxNjwyrVDhfoDuMrDsfR15k/view?usp=drive_link" }
                ]
            },
            {
                name: "Rafael Peña",
                group: "2º CFGB",
                photo: "https://drive.google.com/file/d/14mZYLxoikF2tdfnLyCUWAeePqwcibl9h/view?usp=drive_link", 
                authorized: [
                    { name: "Juan Antonio Gutiérrez", group: "2º CFGB", photo: "https://drive.google.com/file/d/1aj0eYwRy8KUDnXRpxmiMBCU64PYkS-wJ/view?usp=drive_link" },
                    { name: "Rafael Trujillo", group: "2º CFGB", photo: "https://drive.google.com/file/d/1woEY7whWCCxNjwyrVDhfoDuMrDsfR15k/view?usp=drive_link" }
                ]
            },
            {
                name: "José Ángel Pérez",
                group: "1º CFGB",
                photo: "https://drive.google.com/file/d/1UrmJBQ-ndJgcMs3QWwzf5WO2C0ajJIoP/view?usp=drive_link", 
                authorized: [
                    { name: "José Ignacio Encinas", group: "1º CFGB", photo: "https://drive.google.com/file/d/1p0P8NNgcaLLlUxaKwaH_NjvIsC3PM1A0/view?usp=drive_link" },
                    { name: "Pablo Gómez", group: "1º CFGB", photo: "https://drive.google.com/file/d/1-E6m02fk-49vbUKbi8Bn80tYlPWkCkOs/view?usp=drive_link" }
                ] 
            },
            {
                name: "Óscar Silva",
                group: "1º CFGB",
                photo: "https://drive.google.com/file/d/1GtLZLmLlq6_GYuwCHHhurPXY6cr9mwsq/view?usp=drive_link", 
                authorized: [] 
            },
            {
                name: "Lucía Ardila",
                group: "4º A",
                photo: "https://drive.google.com/file/d/1mWQmskB3MP_ky0MBKQFG3ki4vHY9xoJT/view?usp=drive_link", 
                authorized: [] 
            },
            {
                name: "Luisa Casal",
                group: "4º A",
                photo: "https://drive.google.com/file/d/1a0P1ehJWjbz31HlqTdf3RP5jaT4XRxbv/view?usp=drive_link", 
                authorized: [] 
            },
            {
                name: "Yolanda Flores",
                group: "4º A",
                photo: "https://drive.google.com/file/d/1t5rieKN2l3yGPFDIB4mxm35rxTLXw6JZ/view?usp=drive_link", 
                authorized: [] 
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('gridStudents');
            grid.innerHTML = "";
            
            studentsData.forEach(student => {
                const card = document.createElement('div');
                card.className = "student-card bg-white p-3 rounded-[2.5rem] shadow-xl border-2 border-white cursor-pointer";
                card.innerHTML = `
                    <div class="aspect-square w-full relative mb-3">
                        <img src="${cleanDriveLink(student.photo)}" class="absolute inset-0 w-full h-full object-cover rounded-[2rem] bg-slate-100" onerror="this.src='https://via.placeholder.com/400?text=Error+Foto'">
                    </div>
                    <div class="text-center pb-2">
                        <p class="font-bold text-slate-800 text-sm">${student.name}</p>
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-tighter">${student.group}</p>
                    </div>
                `;
                card.onclick = () => openModal(student);
                grid.appendChild(card);
            });
        }

        function openModal(student) {
            const content = document.getElementById('modalContent');
            content.innerHTML = "";

            const header = document.createElement('div');
            header.className = "bg-blue-600 p-6 rounded-[2.5rem] shadow-lg text-center mx-1";
            header.innerHTML = `
                <p class="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1">Autorizados por:</p>
                <h2 class="text-2xl font-extrabold text-white leading-tight">${student.name}</h2>
            `;
            content.appendChild(header);

            if (student.authorized.length === 0) {
                const solo = document.createElement('div');
                solo.className = "bg-white p-8 rounded-[3rem] text-center shadow-xl border border-slate-100 mx-1";
                solo.innerHTML = `
                    <div class="bg-blue-50 text-blue-500 p-4 rounded-full inline-block mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <p class="font-bold text-slate-500">Este alumno sale solo</p>
                `;
                content.appendChild(solo);
            } else {
                student.authorized.forEach(minor => {
                    const minorDiv = document.createElement('div');
                    minorDiv.className = "bg-white p-4 rounded-[3.5rem] shadow-xl border border-blue-50 mx-1";
                    minorDiv.innerHTML = `
                        <div class="aspect-square w-full mb-4 relative">
                            <img src="${cleanDriveLink(minor.photo)}" class="w-full h-full object-cover rounded-[3rem] bg-slate-50 shadow-inner" onerror="this.src='https://via.placeholder.com/400?text=Error+Foto'">
                        </div>
                        <div class="text-center pb-4">
                            <p class="font-black text-2xl text-slate-800 mb-1">${minor.name}</p>
                            <p class="text-lg font-bold text-blue-500 bg-blue-50 inline-block px-6 py-1 rounded-full">${minor.group}</p>
                        </div>
                    `;
                    content.appendChild(minorDiv);
                });
            }

            document.getElementById('modalDetails').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalDetails').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        renderGrid();
    </script>
</body>
</html>
